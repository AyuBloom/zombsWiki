name: Update llms.txt

on:
  push:
    branches: [main]

jobs:
  generate-llms-txt:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Run generate-llms-txt script
        run: |
          node ./scripts/generate-llms-txt.mjs

      - name: Commit and Push llms.txt
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update llms.txt [skip ci]"
